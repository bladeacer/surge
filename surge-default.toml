# Vibrant "Cyberpunk" Neon Colors (Dark Mode)

[colors.dark]
name = "Surge Cyberpunk"

[colors.dark.primary]
# base 00 - DarkGray
background = '#282a36'
# base 05 - Standard Text
foreground = '#f8f8f2'

[colors.dark.normal]
# base 01 - Gray(Selection/Borders)
black =   '#44475a'
# base 08 - StateError
red =     '#ff5555'
# base 0B - StateDownloading
green =   '#50fa7b'
# base 0A - StatePaused
yellow =  '#ffb86c'
# base 0D - Blue (Version)
blue =    '#58a6ff'
# base 0E - Magenta (StateDone)
magenta = '#bd93f9'
# base 0C - Cyan
cyan =    '#8be9fd' 
# base 05 - Standard Text
white = '#f8f8f2'

[colors.dark.bright]
# base 03 - LightGray (Comments/Secondary Info)
black =   '#a9b1d6'
# base 09 - ProgressStart (Pink)
red =     '#ff79c6'
# base 0B - StateDownloading
green =   '#50fa7b'
# base 0A - StatePaused
yellow =  '#ffb86c'
# base 0D - Blue (Version)
blue =    '#58a6ff'
# base 0F - ProgressEnd (Magenta)
magenta = '#bd93f9'
# base 0C - Cyan
cyan =    '#8be9fd' 
# base 07 - Standard Text
white = '#f8f8f2'

# High contrast (Light Mode)

[colors.light]
